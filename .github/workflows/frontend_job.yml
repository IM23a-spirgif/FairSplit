name: Frontend Job

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Formatter
        run: npm run format-check

      - name: Run Linter
        run: npm run lint-check

      - name: Run Frontend Tests (Unit & Integration)
        run: npm run test-coverage
